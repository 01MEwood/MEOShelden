# ============================================
# MEOS:HELDEN — Docker Compose (Single Container)
# Deploy on Hostinger VPS via Docker Manager YAML
# Image: mariomeosv40/meoshelden:latest
# Port: 3800
# ============================================

version: '3.8'

services:
  meoshelden:
    image: mariomeosv40/meoshelden:latest
    container_name: meoshelden
    ports:
      - "3800:3800"
    environment:
      - PORT=3800
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATAFORSEO_LOGIN=${DATAFORSEO_LOGIN}
      - DATAFORSEO_PASSWORD=${DATAFORSEO_PASSWORD}
      - GSC_CREDENTIALS=${GSC_CREDENTIALS}
      - GSC_SITE_URL=https://schreinerhelden.de/
      - JWT_SECRET=${JWT_SECRET}
      - WP_URL=https://schreinerhelden.de
      - WP_USER=${WP_USER}
      - WP_APP_PASSWORD=${WP_APP_PASSWORD}
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
